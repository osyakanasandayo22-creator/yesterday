<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Past Self Chat</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app" id="page">
      <aside class="sidebar" id="sidebar" aria-label="履歴ナビ">
        <div class="sidebar__brand">
          <span class="sidebar__logo" aria-hidden="true">Self</span>
        </div>
        <div class="sidebar__section">
          <button class="sidebtn" id="btnNewChat" type="button" aria-label="新規チャット">
            <span class="sidebtn__icon" aria-hidden="true">+</span>
            <span class="sidebtn__text">新規</span>
          </button>
          <button class="sidebtn" id="btnClearChat" type="button" aria-label="このチャットを消去">
            <span class="sidebtn__icon" aria-hidden="true">x</span>
            <span class="sidebtn__text">消去</span>
          </button>
        </div>
        <div class="sidebar__section">
          <button class="sidebtn sidebtn--ghost" id="btnSettings" type="button" aria-haspopup="dialog" aria-controls="settingsDialog">
            <span class="sidebtn__icon" aria-hidden="true">G</span>
            <span class="sidebtn__text">設定</span>
          </button>
        </div>
        <div class="sidebar__grow" />
        <div class="sidebar__hint">
          <div class="sidebar__hintTitle">Tip</div>
          <div class="sidebar__hintText">AIはここに会話を追加するだけ（履歴は1つ）</div>
        </div>
      </aside>

      <div class="workspace">
        <header class="workspace__header">
          <div class="workspace__headerTitle">
            <div class="workspace__logoMini" aria-hidden="true">Self</div>
            <div class="workspace__titleText">自分に聞く</div>
          </div>
          <div class="workspace__headerActions">
            <button class="iconbtn" id="btnThemeToggle" type="button" aria-label="テーマ切り替え">T</button>
          </div>
        </header>

        <main class="workspace__main" aria-label="チャット">
          <div class="emptyState" id="emptyState">
            <div class="emptyState__title">最小プロトタイプ</div>
            <div class="emptyState__subtitle">ログ保存＋疑似応答（あとでGeminiに差し替え可）</div>
          </div>

          <div class="messages" id="messages" aria-live="polite"></div>

          <div class="composer composer--fixed">
            <form id="composerForm" class="composer__form" autocomplete="off">
              <input
                id="promptInput"
                class="composer__input"
                name="prompt"
                type="text"
                inputmode="text"
                placeholder="自分に質問…"
                aria-label="メッセージ"
              />
              <button id="sendButton" class="composer__send" type="submit" aria-label="送信">&gt;</button>
            </form>
            <div class="composer__hint" id="hint">
              Enterで送信（Shift+Enterは未対応）
            </div>
          </div>
        </main>
      </div>
    </div>

    <dialog class="dialog" id="settingsDialog" aria-label="設定">
      <form method="dialog" class="dialog__card" id="settingsForm">
        <div class="dialog__header">
          <h2 class="dialog__title">設定</h2>
          <button class="iconbtn" type="button" id="btnCloseSettings" aria-label="閉じる">×</button>
        </div>

        <div class="dialog__body">
          <label class="field">
            <span class="field__label">人格（自分像）の指示</span>
            <textarea
              id="personaInput"
              class="field__textarea"
              rows="6"
              placeholder="例）このチャットの発言から推定される私として、短く要点で助言して…"
            ></textarea>
          </label>

          <label class="field">
            <span class="field__label">話す相手（自分のスナップショット）</span>
            <select id="snapshotSelect" class="field__select"></select>
            <span class="field__help">
              会話するほど「自分プロファイル」を更新し、毎ターン保存します。ここで選んだ時点の“自分像”に寄せて返答します。
            </span>
          </label>

          <div class="grid2">
            <label class="field">
              <span class="field__label">Geminiを使う（任意）</span>
              <select id="providerSelect" class="field__select">
                <option value="gemini">Gemini（Vercel環境変数で接続）</option>
                <option value="mock">疑似応答（フォールバック）</option>
              </select>
            </label>

            <label class="field">
              <span class="field__label">モデル</span>
              <input id="modelInput" class="field__input" type="text" placeholder="例）gemini-3-flash-preview / gemini-3-flash-lite-preview" />
            </label>
          </div>

          <label class="field">
            <span class="field__label">Geminiキー（Vercelで保護）</span>
            <span class="field__help">
              GeminiのAPIキーはこの画面では入力しません。Vercelの環境変数 <strong>GEMINI_API_KEY</strong> に設定してください（キーはブラウザに保存されません）。
            </span>
          </label>

          <div class="row">
            <button class="btn" id="btnTest" type="button">接続テスト</button>
            <span class="muted" id="testResult" role="status" aria-live="polite"></span>
          </div>

          <hr class="sep" />

          <div class="row">
            <button class="btn btn--ghost" id="btnExport" type="button">チャットを書き出し</button>
            <button class="btn btn--ghost" id="btnImport" type="button">チャットを読み込み</button>
            <input id="importFile" type="file" accept="application/json" hidden />
          </div>
        </div>

        <div class="dialog__footer">
          <button class="btn btn--ghost" value="cancel" type="button" id="btnCancel">キャンセル</button>
          <button class="btn" value="default" type="submit" id="btnSave">保存</button>
        </div>
      </form>
    </dialog>

    <script src="./script.js"></script>
  </body>
</html>
